<!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>You're In — DJ24 Early Access</title>
  <meta name="description" content="You're on the DJ24 Early Access list. Thank you for joining the future of business aviation.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .thankyou-hero{max-width:760px;margin:auto;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:40px 24px}
  .checkmark-circle{width:80px;height:80px;border-radius:50%;background:rgba(255,138,0,.12);border:2px solid #ff8a00;display:flex;align-items:center;justify-content:center;margin:0 auto 32px;animation:popIn .6s cubic-bezier(.175,.885,.32,1.275) both}
  .checkmark-circle svg{width:36px;height:36px}
  @keyframes popIn{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
  .thankyou-hero h1{font-size:3rem;margin:24px 0 12px;animation:fadeUp .7s .1s both}
  .thankyou-hero .subtitle{font-size:1.2rem;color:#bbb;font-weight:400;margin-bottom:32px;animation:fadeUp .7s .2s both}
  .perks{background:#111;border:1px solid #222;border-radius:20px;padding:32px 36px;margin:28px 0 36px;width:100%;text-align:left;animation:fadeUp .7s .3s both}
  .perks p{color:#cfcfcf;line-height:1.9;margin-bottom:8px}
    .perks .perk-item{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
  .perk-item .tick{color:#ff8a00;font-size:1.2rem;margin-top:2px;flex-shrink:0}
    .perk-item span{color:#cfcfcf;line-height:1.7}
      .launch-note{color:#777;font-size:.95rem;margin-top:4px;margin-bottom:36px;animation:fadeUp .7s .4s both}
  .launch-note strong{color:#ff8a00}
      .btn-home{display:inline-block;padding:16px 36px;border:none;border-radius:40px;background:#ff8a00;color:#fff;font-weight:bold;font-size:1rem;cursor:pointer;text-decoration:none;transition:opacity .2s,transform .2s;animation:fadeUp .7s .5s both}
    .btn-home:hover{opacity:.88;transform:translateY(-2px)}
  @keyframes fadeUp{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
  .particles{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
  .particle{position:absolute;width:4px;height:4px;border-radius:50%;background:#ff8a00;opacity:0;animation:float linear infinite}
    @keyframes float{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:.6}90%{opacity:.2}100%{transform:translateY(-10vh) scale(1.5);opacity:0}}
  .thankyou-hero,.perks,.btn-home{position:relative;z-index:1}
  @media(max-width:600px){.thankyou-hero h1{font-size:2.2rem}.perks{padding:24px 20px}.thankyou-hero .subtitle{font-size:1rem}}
</style>
  </head>
  <body>
  <div class="bg"></div>
  <div class="particles" id="particles"></div>

  <section class="thankyou-hero">
    <div class="checkmark-circle">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M7 18L14 25L29 11" stroke="#ff8a00" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <img src="assets/logo.png" class="logo" alt="DJ24 Logo" style="width:160px;margin-bottom:20px">

    <h1>Welcome to DJ24</h1>
    <p class="subtitle">You're officially on the Early Access list.</p>

    <div class="perks">
      <p style="color:#fff;font-weight:600;margin-bottom:18px;font-size:1.05rem">Thank you for joining the future of business aviation.</p>
    <p style="margin-bottom:20px;color:#aaa;font-size:.95rem">As promised, you'll receive:</p>
      <div class="perk-item">
        <span class="tick">✓</span>
        <span><strong style="color:#fff">6 months of complimentary access</strong> when DJ24 launches.</span>
      </div>
    </div>

    <p class="launch-note">We'll keep you updated as we move toward launch in <strong>2027</strong>.</p>

    <a href="https://www.datajet24.com" class="btn-home">← Return to Homepage</a>
  </section>

  <script>
  (function(){
    var container = document.getElementById('particles');
  for(var i=0;i<18;i++){
    var p=document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*100+'%';
    p.style.animationDuration=(6+Math.random()*10)+'s';
    p.style.animationDelay=(Math.random()*8)+'s';
    p.style.width=p.style.height=(2+Math.random()*4)+'px';
    container.appendChild(p);
  }
})();
</script>
  </body>
  </html>
